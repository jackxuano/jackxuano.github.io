<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taiwan Golf Trip · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1a35;
  --gold:#f0c040;
  --blue:#1e50e2;
  --white:#fff;
  --muted:#94a3b8;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.1);
}

html,body{
  min-height:100vh;
  background:#0a1628;
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}

/* Background texture */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(30,80,226,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(240,192,64,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 100% 80% at 50% 50%, #0c1a35 0%, #0a1628 100%);
  z-index:0;
  pointer-events:none;
}

/* Subtle grid overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:48px 48px;
  z-index:0;
  pointer-events:none;
}

.container{
  position:relative;
  z-index:1;
  max-width:520px;
  margin:0 auto;
  padding:0 20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-top:48px;
  padding-bottom:48px;
}

/* Flag / badge */
.trip-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(240,192,64,0.12);
  border:1px solid rgba(240,192,64,0.3);
  border-radius:100px;
  padding:6px 16px;
  font-size:12px;
  font-weight:600;
  color:var(--gold);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:28px;
  animation:fadeDown .5s ease both;
}
.trip-badge .flag{font-size:16px}

/* Hero title */
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem, 12vw, 5rem);
  line-height:.95;
  letter-spacing:.02em;
  color:var(--white);
  margin-bottom:8px;
  animation:fadeDown .5s .1s ease both;
}
.hero-title span{color:var(--gold)}

.hero-sub{
  font-size:14px;
  color:var(--muted);
  margin-bottom:48px;
  animation:fadeDown .5s .15s ease both;
}

/* Divider */
.divider{
  width:40px;
  height:2px;
  background:var(--gold);
  margin-bottom:32px;
  animation:expandWidth .6s .2s ease both;
}

/* Course cards */
.courses{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-bottom:40px;
}

.course-card{
  display:block;
  text-decoration:none;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:24px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  animation:fadeUp .5s ease both;
}
.course-card:nth-child(1){animation-delay:.25s}
.course-card:nth-child(2){animation-delay:.35s}

.course-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events:none;
}

/* Left accent bar */
.course-card::after{
  content:'';
  position:absolute;
  left:0;top:20%;bottom:20%;
  width:3px;
  border-radius:0 3px 3px 0;
  background:var(--gold);
  opacity:0;
  transition:opacity .2s ease, top .2s ease, bottom .2s ease;
}
.course-card:hover::after{opacity:1;top:10%;bottom:10%}

.course-card:hover{
  transform:translateY(-3px);
  border-color:rgba(240,192,64,0.35);
  box-shadow:0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(240,192,64,0.1);
}

.card-day{
  font-size:11px;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-day .dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--gold);
  display:inline-block;
}

.card-name-cn{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;
  line-height:1;
  color:var(--white);
  letter-spacing:.04em;
  margin-bottom:4px;
}

.card-name-en{
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

.card-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.meta-tag{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:4px 12px;
  font-size:12px;
  color:#cbd5e1;
}

.card-arrow{
  position:absolute;
  right:24px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:20px;
  transition:transform .2s ease, color .2s ease;
}
.course-card:hover .card-arrow{
  transform:translateY(-50%) translateX(4px);
  color:var(--gold);
}

/* Footer note */
.footer-note{
  font-size:12px;
  color:rgba(148,163,184,0.6);
  text-align:center;
  animation:fadeUp .5s .5s ease both;
}
.footer-note a{color:rgba(240,192,64,0.7);text-decoration:none}

/* Animations */
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes expandWidth{
  from{width:0;opacity:0}
  to{width:40px;opacity:1}
}

@media(max-width:400px){
  .container{padding:0 16px;padding-top:40px;padding-bottom:40px}
  .card-name-cn{font-size:1.6rem}
}
</style>
</head>
<body>
<div class="container">

  <div class="trip-badge">
    <span class="flag">🇹🇼</span>
    Taiwan Golf Trip · May 2026
  </div>

  <div class="hero-title">Two<br>Courses.<br><span>Two Days.</span></div>
  <div class="hero-sub">Select a round to open your caddie guide.</div>

  <div class="divider"></div>

  <div class="courses">

    <a class="course-card" href="TW2205-golf.html">
      <div class="card-day"><span class="dot"></span>Day 1 · Thursday 22 May · 12:10 Tee Off</div>
      <div class="card-name-cn">再興球場</div>
      <div class="card-name-en">Zai Xing Golf Club</div>
      <div class="card-meta">
        <span class="meta-tag">📍 Taiwan</span>
        <span class="meta-tag">18 Holes</span>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="course-card" href="TW2305-golf.html">
      <div class="card-day"><span class="dot"></span>Day 2 · Friday 23 May · 10:30 Tee Off</div>
      <div class="card-name-cn">國華球場</div>
      <div class="card-name-en">Kuo Hua Golf Course</div>
      <div class="card-meta">
        <span class="meta-tag">📍 Taiwan</span>
        <span class="meta-tag">18 Holes</span>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>



</div>
</body>
</html>
